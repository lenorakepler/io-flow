# Idiom 1: the object is the edge (baton style). Most pipeline/ETL diagrams don't draw the Result as a node at all — the stages are nodes, and the Result is the thing traveling along the edges, shown as edge labels. Instantiation is the first stage; output is the last.

# This reads left-to-right as "Result flows through these stages" and emphasizes order. It's the right choice when the mutation is incidental and the pipeline sequence is the story. (Explicit edges: already accept any free type: tag, so passes needs no registration and is stylable as .edge--passes in CSS.)

# nodes:
#   functions:
#     make_result: { loc: src/result.py }
#     add_stats: {}
#     add_plots: {}
#   input:
#     report: { type: file }

# edges:
#   - { from: make_result, to: add_stats, type: passes, label: Result }
#   - { from: add_stats, to: add_plots, type: passes, label: Result }
#   - { from: add_plots, to: report, type: returns, label: Result }

# Idiom 2: the object is a hub (contributor style). Keep Result as a class node, have the constructor point at it, and have each stage point at it with a distinct relationship. This is exactly what the relations: feature I just added is for:

relations:
  updates: { direction: out } # stage writes into the accumulator

nodes:
  classes:
    Result: { loc: src/result.py }
  functions:
    make_result:
      returns: { Result: "new" }
    add_stats:
      updates: { Result: stats }
    add_plots:
      updates: { Result: plots }
    write_out:
      args: { result: Result } # reads the finished object
      returns: { report: "" }
