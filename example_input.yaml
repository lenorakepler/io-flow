# Draft specification of a new type of layout diagram, building off
# of pipeline
#
# Node types:
# -----------
#   1. Processing: do not store, only input and output. Maybe color by location.
#     - Functions
#     - Methods
#
#   2. Input/Output: passed in and out by functions. Allow for differential
#      styling based on type and whether it is input, output, or intermediate.
#     - Files (user spec or output)
#     - Options (user spec, things that specify WHAT is run/output)
#     - Parameters (user spec, things that change HOW things are run)
#     - Intermediates (things generated by and passed between processors)
#
#   3. Classes: these can be both processing and I/O, so for now, treat
#      as a wrapper for an "Attributes" node and any methods.
#
# Edges:
# ------
# In the example below, the input nodes would be created and classed based
# on type so they can be styled accordingly). The 'Config' class would be a
# wrapper containing 'attributes' (clicked on reveals names) and methods
# nodes ('from_yaml'). The 'mapqual' node would have an arrow going into Config
# 'attributes'. The 'configfile' node would have an arrow going to Config
# 'from_yaml'.
#
# The 'Config' class wrapper would in turn have an arrow pointing at
# the run_coverage' node, as would the 'skippreflight'
#
# Nesting:
# --------
# Not implemented in this short example, but would like to be able to
# group classes/functions into "steps" or "workflows".
#
nodes:
  input:
    # Any parameters that go in config or are passed to the command line
    # Put CLI input flag, example value, and type (file, option, parameter)
    # e.g.:
    file1:
      cli: --file1
      value: file1.txt
      description: A file of a specific type
      type: file
    configfile:
      cli: --config
      value: config.yaml
      description: optional config file
      type: file
    full:
      cli: --full
      value: ""
      description: generate full output
      type: option
    limitparam:
      cli: --min-param
      value: 60
      type: parameter
    skippreflight:
      value: False
      type: option
      description: skip validation

  classes:
    Config:
      loc: src/config.py
      attributes:
        param_min: limitparam
      methods:
        from_yaml:
          args:
            path: configfile

  functions:
    do_run:
      loc: src/run.py
      args:
        config: Config
        skip_preflight: skippreflight
