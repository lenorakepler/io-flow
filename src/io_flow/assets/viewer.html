<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!--__TITLE__--></title>
<style>
/*__STYLES__*/
</style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <div id="canvas">
        <svg id="edges" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z"></path>
            </marker>
          </defs>
        </svg>
      </div>
    </div>
    <div id="hud">
      <input id="search" type="search" placeholder="Filter nodes…" autocomplete="off"
             aria-label="Filter nodes">
      <div id="legend"></div>
    </div>
    <aside id="sidebar" aria-label="Node details" hidden></aside>
    <div id="notice" role="status" hidden></div>
    <button id="save-btn" aria-live="polite" hidden>Save layout</button>
  </div>

  <script id="graph-data" type="application/json">/*__GRAPH__*/</script>
  <!--__SCRIPTS__-->
</body>
</html>
