# io-flow example — grammar quick reference
#
# $name means node, everywhere:
# -----------------------------
#   - A key starting with $ DECLARES a node. Nest $keys inside a node to
#     declare children. Names are globally unique and ARE the ids -- nesting
#     only sets the parent, so regrouping never changes a name. Labels
#     default to the name.
#   - A $-marked key or string value inside args/calls/returns (or any
#     relation registered under `relations:`) REFERENCES a node by name.
#     Unmarked strings are always literals and can never create edges.
#
# Everything in a node's mapping that is not $-marked and not reserved
# (type, label, relation names) is free-form data: it shows in the sidebar
# and is available to node templates (cli:, value:, loc:, description:, ...).
#
# type: is free-form and maps straight to a template + .node--<type> CSS
# class. Untyped nodes get a type from `defaults:` below (parent type ->
# child type; _root for top-level), falling back to plain "node".

defaults:
  class: method # untyped children of a class are methods
  group: function # untyped children of a group are functions

nodes:
  # Inputs: files / options / parameters, typed for differential styling.
  $file1:
    cli: --file1
    value: file1.txt
    description: A file of a specific type
    type: file
  $configfile:
    cli: --config
    value: config.yaml
    description: optional config file
    type: file
  $full:
    cli: --full
    value: ""
    description: generate full output
    type: option
  $limitparam:
    cli: --min-param
    value: 60
    type: parameter
  $skippreflight:
    value: False
    type: option
    description: skip validation

  # A class is just a node of type `class` whose children happen to be
  # methods (via defaults: above). The attributes node pulls limitparam in
  # with a plain args reference.
  $Config:
    type: class
    loc: src/config.py
    $attributes:
      type: attributes
      args:
        param_min: $limitparam
    $from_yaml:
      args:
        path: $configfile

  $do_run:
    type: function
    loc: src/run.py
    args:
      # values here: $-marked = reference, unmarked = literal default.
      config: $Config
      skip_preflight: $skippreflight
    # `calls:` draws an edge from this node to the referenced node. The
    # unmarked side is optional edge-label text ("" for no label).
    calls:
      $from_yaml: load config
      $preflight: ""
    # `returns:` has the same shape -- edge from this node to the target.
    returns:
      $report: qc report
  $preflight:
    type: function
    loc: src/run.py
  $report:
    type: function
    loc: src/run.py
    # `label:` overrides the display name while the name stays the unique,
    # addressable key -- when two things naturally share a name, pick unique
    # names (dots are fine: $Config.run) and label them for display.
    label: build_report

  # Any node with $children is a compound container (think "steps" or
  # "workflows"); it may also carry args/calls/returns of its own, behaving
  # like a function. References are plain names wherever the node lives.
  $postprocess:
    type: group
    loc: src/post.py
    $summarize:
      loc: src/post.py
      calls:
        $plot: ""
    $plot:
      loc: src/post.py

# Explicit edges: an alternative to deriving edges from relation blocks.
# `from`/`to` are $-marked node references (direction as written); `type` is
# a free tag (conventionally a relation name); `label` is optional.
edges:
  - from: $preflight
    to: $report
    type: calls
    label: validate
