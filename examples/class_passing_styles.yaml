# Idiom 1: the object is the edge (baton style).
# -----------------------------------------------
# Most pipeline/ETL diagrams don't draw the Result as a node at all — the stages are nodes, and the Result is the thing traveling along the edges, shown as edge labels. Instantiation is the first stage; output is the last.

# This reads left-to-right as "Result flows through these stages" and emphasizes order. It's the right choice when the mutation is incidental and the pipeline sequence is the story. (Explicit edges: already accept any free type: tag, so passes needs no registration and is stylable as .edge--passes in CSS.)

# Idiom 2: the object is a hub (contributor style).
# --------------------------------------------------
# Keep Result as a class node, have the constructor point at it, and have each stage point at it with a distinct relationship. This is exactly what the relations: feature is for:

relations:
  updates: { direction: out } # stage writes into the accumulator
defaults:
  group: function # untyped group members are functions
nodes:
  $baton:
    type: group
    label: Object as Edge / Baton Style
    $make_resultA: { loc: src/result.py }
    $add_statsA: {}
    $add_plotsA: {}
    $reportA: { type: file }
    # The baton edges are internal wiring, so they live inside the group.
    edges:
      - { from: $make_resultA, to: $add_statsA, type: passes, label: ResultA }
      - { from: $add_statsA, to: $add_plotsA, type: passes, label: ResultA }
      - { from: $add_plotsA, to: $reportA, type: returns, label: ResultA }
  $hub:
    type: group
    label: Object as Hub / Contributor Style
    $ResultB: { type: class, loc: src/result.py }
    $make_resultB:
      returns: { $ResultB: "new" }
    $add_statsB:
      updates: { $ResultB: stats }
    $add_plotsB:
      updates: { $ResultB: plots }
    $write_out:
      args: { result: $ResultB } # reads the finished object
      returns: { $reportB: "" }
    $reportB: { type: file }

